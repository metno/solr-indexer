# Configuration template file
# Created by: Øystein Godøy, METNO/FOU, 2019-10-23
# Updated by: Magnar Martinsen, METNO/FOU, 2025-05-02

#Logging (optional)
logfile: <YOUR LOGFILE>

# Solr connection information (Required)
solrserver: <YOUR SolR Server>
solrcore: <YOUR SolR Core>

# Add support for solr basic authentication (Optional)
# uncomment and set <USERNAME> & <PASSWORD> to enable Authentication
#auth-basic-username: <USERNAME>
#auth-basic-password: <PASSWORD>

# Bulkindexer settings (optional)
batch-size: 250
#Worker processes
workers: 3
threads: 4

# Path to the MMD XSD schema file for optional pre-indexing validation (optional)
# If set, each MMD document is validated against the schema before indexing.
# Validation failures are logged as warnings and do not stop indexing.
#mmd-xsd-path: /path/to/mmd/xsd/mmd.xsd

# Vocabulary validation settings (optional)
# Path to the local MMD vocabulary TTL file for controlled-vocabulary validation.
# When set, each MMD document's controlled fields (iso_topic_category, collection,
# dataset_production_status, quality_control, metadata_source) are validated against
# the vocabulary. Non-controlled values are logged as warnings and do not stop indexing.
# The vocabulary is loaded once at startup and reused for all documents (efficient).
# If omitted and vocabulary-backend is native/default, the indexer falls back to
# REST lookup at vocabulary-endpoint-base-url.
#vocabulary-ttl-path: /path/to/mmd/thesauri/mmd-vocabulary.ttl

# Vocabulary backend to use (optional, default: native)
#   native          - use rdflib to read the local TTL file (requires vocabulary-ttl-path)
#   legacy-metvocab - use the old metvocab/MMDGroup package (fetches from remote URLs)
#   rest-skosmos    - fetch vocabulary TTL from a Skosmos REST endpoint (cached in-memory)
#vocabulary-backend: native

# Skosmos REST backend settings (optional, used when vocabulary-backend=rest-skosmos)
# Base URL can be the site root (https://vocab.met.no) or /mmd path.
# The indexer normalizes it to /rest/v1/<vocab>/data automatically.
# Example for https://vocab.met.no/swagger.json API:
#vocabulary-endpoint-base-url: https://vocab.met.no/mmd
#vocabulary-endpoint-timeout: 20.0

# NBS specific thumnail configuration (optional)
#nbs-thumbnails-base-path: <Base file path where to find NBS products and thumbnail.png>
#nbs-thumbnails-base-url: <Base url from where the thumbnails will be served>
