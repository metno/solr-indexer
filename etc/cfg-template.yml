# solrindexer configuration template
# Created by: Øystein Godøy, METNO/FOU, 2019-10-23
# Updated by: Magnar Martinsen, METNO/FOU, 2026-04-14
#
# Copy this file, remove or fill in the values you need, and pass it to
# indexdata or searchindex with -c <your-config.yml>.
#
# Lines starting with # are comments. Commented-out keys show optional settings
# with their default values.

# ---------------------------------------------------------------------------
# Solr connection (Required)
# ---------------------------------------------------------------------------

# Base URL of the Solr instance. Must end with /solr/
solrserver: http://localhost:8983/solr/

# Solr core or collection name
solrcore: mmd-data

# ---------------------------------------------------------------------------
# Authentication (Optional)
# ---------------------------------------------------------------------------
# Choose one of the three methods below. If none is configured, authentication
# is disabled.

# Method 1: Inline credentials (store securely; avoid committing to version control)
#auth-basic-username: <USERNAME>
#auth-basic-password: <PASSWORD>

# Method 2: Absolute path to a .env file containing SOLR_USERNAME and SOLR_PASSWORD
#dotenv_path: /etc/solrindexer/.env

# Method 3 (default): If neither of the above is set, a .env file in the
# current working directory is used automatically. Authentication is disabled
# if SOLR_USERNAME / SOLR_PASSWORD are absent or empty.

# ---------------------------------------------------------------------------
# Indexing performance (Optional)
# ---------------------------------------------------------------------------

# Number of documents sent to Solr in a single HTTP request.
# Larger values improve throughput but require more memory.
# Default: 2500
batch-size: 2500

# Number of parallel OS-level worker processes.
# Useful for very large datasets on multi-core machines. Each process runs its
# own BulkIndexer instance. Can also be set with --processes on the CLI.
# Default: 1
#workers: 1

# Number of I/O-bound threads per worker process used for reading and
# transforming MMD files. Can also be set with --threads on the CLI.
# Default: 20
threads: 20

# Send a final hard commit to Solr after all documents have been indexed.
# Useful when Solr's autoCommit interval is long and you need changes visible
# immediately. Default: false
#end-solr-commit: false

# ---------------------------------------------------------------------------
# Feature type extraction (Optional)
# ---------------------------------------------------------------------------

# Skip OPeNDAP featureType extraction entirely.
# Extraction opens each dataset's OPeNDAP endpoint via xarray, which can be
# slow or unavailable. Default: false (extraction is attempted)
#skip-feature-type: false

# Force a fixed featureType for every document indexed in this run.
# Valid values: point, timeSeries, trajectory, profile, timeSeriesProfile,
#               trajectoryProfile
# Setting this also skips the OPeNDAP extraction.
#override-feature-type: timeSeries

# ---------------------------------------------------------------------------
# MMD schema validation (Optional)
# ---------------------------------------------------------------------------

# Absolute path to the MMD XSD schema file (mmd.xsd).
# When set, each document is validated before indexing. Validation failures
# are logged as warnings and never block indexing.
# Typically found at: /path/to/mmd/xsd/mmd.xsd
#mmd-xsd-path: /path/to/mmd/xsd/mmd.xsd

# ---------------------------------------------------------------------------
# Vocabulary validation (Optional)
# ---------------------------------------------------------------------------

# Controlled vocabulary backend. Validates fields such as iso_topic_category,
# collection, dataset_production_status, quality_control, and metadata_source.
# Non-controlled values are logged as warnings and never block indexing.
#
# Backends:
#   native          - Read a local TTL file with rdflib (requires vocabulary-ttl-path
#                     and the rdflib extra: pip install ".[rdflib]")
#   legacy-metvocab - Use the metvocab/MMDGroup package (requires metvocab extra)
#   rest-skosmos    - Fetch and cache vocabulary from a Skosmos REST endpoint
#
# Default: native
#vocabulary-backend: native

# Path to a local MMD vocabulary TTL file (used with native backend).
# The vocabulary is loaded once at startup and reused for all documents.
# Typically found at: /path/to/mmd/thesauri/mmd-vocabulary.ttl
#vocabulary-ttl-path: /path/to/mmd/thesauri/mmd-vocabulary.ttl

# Base URL for REST Skosmos vocabulary lookups (used with rest-skosmos backend).
# The URL may point to the API root (https://vocab.met.no) or the /mmd path;
# the indexer normalises it to /rest/v1/<vocab>/data automatically.
# Default: https://vocab.met.no/mmd
#vocabulary-endpoint-base-url: https://vocab.met.no/mmd

# HTTP timeout in seconds for REST vocabulary requests.
# Default: 20.0
#vocabulary-endpoint-timeout: 20.0

# Directory for persistent REST vocabulary cache files.
# Useful on compute clusters where /tmp is frequently cleared.
# If omitted, cache is stored under /tmp (system temp dir).
# Example: /mnt/shared/solrindexer/vocab-cache
#vocabulary-cache-dir: /mnt/shared/solrindexer/vocab-cache

# ---------------------------------------------------------------------------
# NBS thumbnail lookup (Optional — NBS scope only)
# ---------------------------------------------------------------------------
# When scope is NBS (or --nbs is passed on the CLI), the indexer looks up
# pre-generated thumbnail.png files on the local filesystem and adds their
# public URLs to the thumbnail_url Solr field.

# Set scope to NBS to enable NBS-specific processing.
# Can also be enabled with --nbs on the CLI.
#scope: NBS

# Root filesystem path where NBS product directories and thumbnail.png files
# are stored (e.g. /mnt/nbs-products).
#nbs-thumbnails-base-path: /mnt/nbs-products

# Public base URL from which those thumbnails are served
# (e.g. https://nbs.example.com/products).
#nbs-thumbnails-base-url: https://nbs.example.com/products

# ---------------------------------------------------------------------------
# ADC thumbnail lookup (Optional — ADC scope only)
# ---------------------------------------------------------------------------
# When scope is ADC (or --adc is passed on the CLI), the indexer looks up
# pre-generated PNG files generated by metsis-thumbnail-generator and adds
# their public URLs to the thumbnail_url Solr field.

# Set scope to ADC to enable deterministic ADC thumbnail lookup.
# Can also be enabled with --adc on the CLI.
#scope: ADC

# Root filesystem path where ADC thumbnails are stored.
#adc-thumbnails-base-path: /mnt/adc-thumbnails

# Public base URL from which ADC thumbnails are served.
#adc-thumbnails-base-url: https://adc.example.com/thumbnails
