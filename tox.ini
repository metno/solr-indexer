[tox]
envlist = py39, py310, py311, py312, py314, lint, format-check, typecheck, security, prospector
skip_missing_interpreters = true


# Tests install package and project extras.
[testenv]
package = editable
extras = dev,rdflib
commands =
    pytest {posargs:tests} -q


# Fast static checks: skip installing this package in each env.
[testenv:lint]
package = skip
deps =
    ruff
commands =
    ruff check solrindexer tests

[testenv:lint-fix]
package = skip
deps =
    ruff
commands =
    ruff check --fix solrindexer tests

[testenv:format]
package = skip
deps =
    ruff
commands =
    ruff format solrindexer tests

[testenv:format-check]
package = skip
deps =
    ruff
commands =
    ruff format --check solrindexer tests

[testenv:typecheck]
package = skip
deps =
    mypy
    types-requests
    types-PyYAML
    types-python-dateutil
setenv =
    PYTHONPATH = {toxinidir}
commands =
    mypy solrindexer

[testenv:security]
package = skip
deps =
    bandit[toml]
commands =
    bandit -r solrindexer -lll

[testenv:prospector]
package = editable
extras = dev,rdflib,rich
deps =
    prospector
commands =
    prospector solrindexer
