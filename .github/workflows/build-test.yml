name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev,rdflib]

      - name: Smoke test installed CLI entry points
        run: |
          indexdata --help
          bulkindexer --help
          searchindex --help

      - name: Run pytest
        run: |
          pytest -q

  quality:
    name: Quality checks (tox)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tox
        run: |
          python -m pip install --upgrade pip
          pip install tox

      - name: Run linting and analysis envs
        run: |
          tox -e lint,format-check,typecheck,security,prospector
